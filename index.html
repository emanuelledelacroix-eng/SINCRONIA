<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINCRONIA | Emmanuel Delacroix</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(180deg,#fbf7ea 0%,#f2ead2 100%);
    font-family:Georgia,"Times New Roman",serif;
    color:#2d2d2d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.card{
    max-width:520px;
    width:100%;
    background:#ffffffdd;
    backdrop-filter:blur(8px);
    border-radius:24px;
    padding:32px;
    text-align:center;
    box-shadow:0 12px 35px rgba(0,0,0,.10);
}

.cover{
    width:100%;
    border-radius:18px;
    margin-bottom:28px;
}

h1{
    font-size:2.4rem;
    letter-spacing:0.25rem;
    margin-bottom:16px;
}

.quote{
    font-style:italic;
    color:#555;
    line-height:1.8;
    margin-bottom:34px;
    font-size:1.05rem;
}

.listen{
    display:block;
    text-decoration:none;
    background:#222;
    color:white;
    padding:18px;
    border-radius:14px;
    font-size:1.1rem;
    font-weight:bold;
    transition:0.25s;
}

.listen:hover{
    transform:translateY(-2px);
    opacity:0.95;
}

.links{
    margin-top:24px;
}

.links a{
    color:#666;
    text-decoration:none;
    margin:0 12px;
    font-size:0.95rem;
}

.links a:hover{
    text-decoration:underline;
}

.footer{
    margin-top:30px;
    color:#999;
    font-size:0.85rem;
}
</style>
</head>

<body>

<div class="card">

    <img src="portada.jpg" alt="Portada de SINCRONIA" class="cover">

    <h1>SINCRONIA</h1>

    <p class="quote">
        “Lo más bello es también lo más sagrado.<br>
        Y así era todo en él.<br>
        Como su canto, así era su vida.”
    </p>

    <!-- Botón principal -->
    <a class="listen"
       href="https://open.spotify.com/intl-es/album/3O6Z5dFBk3EwpxCivAHVgo?si=2WAjS9bzT0Su1ekp885W9g"
       target="_blank">
       🎧 Escuchar ahora
    </a>

    <div class="links">
        <a href="https://www.youtube.com/watch?v=-v-l7tCS5SA&list=OLAK5uy_kjKA8ejECotlcDQuGI0irVhBg3hDx7orc" target="_blank">
            YouTube
        </a>

        |

        <a href="https://www.instagram.com/emmanuel_delacroix/" target="_blank">
            Instagram
        </a>
    </div>

    <div class="footer">
        Emmanuel Delacroix
    </div>

</div>

</body>
</html>
